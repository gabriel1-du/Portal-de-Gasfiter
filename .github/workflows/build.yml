name: CI/CD Portal Ofires - Full Stack Scan

on:
  push:
    branches: [ "main", "develop", "desarrollo-apis" ]
  pull_request:
    branches: [ "main" ]

# 1. SOLUCIÓN AL ERROR 403: Otorgar permisos al Token
permissions:
  contents: read
  statuses: write # Permite al linter publicar su estado

jobs:
  # --- JOB PARA LAS APIS JAVA (Maven) ---
  backend-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. SOLUCIÓN A LAS RUTAS: Agregar "Proyecto/"
      - name: Build Usuario API
        run: mvn -B package -DskipTests
        working-directory: Proyecto Titulacion/Apis/usuarioApi

      - name: Security Scan (Usuario API)
        run: mvn org.owasp:dependency-check-maven:check
        working-directory: Proyecto Titulacion/Apis/usuarioApi
        continue-on-error: true

      - name: Build ApiGateWay
        run: mvn -B package -DskipTests
        working-directory: Proyecto Titulacion/Apis/ApiGateWay

      - name: Security Scan (Gateway)
        run: mvn org.owasp:dependency-check-maven:check
        working-directory: Proyecto Titulacion/Apis/ApiGateWay
        continue-on-error: true

  # --- JOB PARA EL FRONTEND (React + Vite) ---
  frontend-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # 3. SOLUCIÓN AL ERROR DE CACHÉ DE NODE
          cache-dependency-path: Proyecto Titulacion/Proyecto/PaginaFrontEnd/PortalOficiosRed/package-lock.json

      - name: Instalar dependencias y Build
        run: |
          npm install
          npm run build
        # 4. SOLUCIÓN A LA RUTA DEL BUILD FRONTEND
        working-directory: Proyecto Titulacion/Proyecto/PaginaFrontEnd/PortalOficiosRed

  # --- JOB DE SEGURIDAD Y CALIDAD (Secretos y Lint) ---
  security-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Super-Linter
        uses: github/super-linter@v5
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 5. SOLUCIÓN A LOS 53 ERRORES DE CHECKSTYLE (Apagar validación Java)
          VALIDATE_JAVA: false
          VALIDATE_JAVASCRIPT_REACT: true
          VALIDATE_CSS: true